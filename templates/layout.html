<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='dist/output.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='images/cheeta.png') }}"
    />
    {% if title %}
    <title>{{title}} | CheetaGo</title>
    {% else %}
    <title>CheetaGo</title>
    {% endif %}
  </head>
  <body class="font-sans text-2xl">
    <nav class="sticky w-full z-20 top-0 inset-s-0">
      <div
        class="max-w-7xl flex flex-wrap items-center justify-between mx-auto px-4 py-2"
      >
        <a
          href="http://127.0.0.1:5000/"
          class="flex items-center space-x-1 rtl:space-x-reverse"
        >
          <img
            src="../static/images/logo.jpg"
            class="w-16"
            alt="Flowbite Logo"
          />
          <span
            class="self-center text-[20px] text-heading font-semibold whitespace-nowrap text-(--blue)"
            >CheetaGo</span
          >
        </a>
        <div class="flex md:order-2 space-x-3 md:space-x-0">
          <button
            type="button"
            class="text-(--blue) rounded-full cursor-pointer box-border border border-(--blue) font-medium leading-5 text-[16px] px-3 py-2 hover:text-white hover:bg-(--blue) transition duration-300"
          >
            Get started
          </button>
          <button
            data-collapse-toggle="navbar-sticky"
            type="button"
            class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
          >
            <span class="sr-only">Open main menu</span>
            <svg
              class="w-6 h-6"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2"
                d="M5 7h14M5 12h14M5 17h14"
              />
            </svg>
          </button>
        </div>
        <div
          class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
          id="navbar-sticky"
        >
          <ul
            class="flex flex-col p-4 md:p-0 mt-4 font-medium rounded-base bg-neutral-secondary-soft md:space-x-8 md:flex-row md:mt-0 md:border-0 md:bg-neutral-primary items-center"
          >
            <li>
              <a
                href="#"
                class="block py-2 px-3 bg-brand rounded-sm md:bg-transparent md:text-fg-brand md:p-0 text-[18px] hover:text-(--primaryHover) transition duration-300"
                >Home</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent text-[18px] hover:text-(--primaryHover) transition duration-300"
                >About</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent text-[18px] hover:text-(--primaryHover) transition duration-300"
                >Services</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent text-[18px] hover:text-(--primaryHover) transition duration-300"
                >Contact</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    {% block content %} {% endblock content %}
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
  </body>
</html>
