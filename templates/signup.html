<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='dist/output.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    {% if title %}
    <title>{{title}} | CheetaGo</title>
    {% else %}
    <title>CheetaGo</title>
    {% endif %}
  </head>
  <body
    class="font-sans h-screen bg-[url('/static/images/stacked-waves-haikei.svg')] bg-no-repeat bg-cover flex justify-center items-center text-(--text)"
  >
    <div
      class="bg-(--background) p-8 lg:p-10 rounded-lg space-y-4 min-w-xs lg:w-md m-6"
    >
      <h2 class="text-xl font-semibold lg:text-2xl lg:font-bold">
        Create your CheetaGo account
      </h2>
      <!-- form to manually sign in -->
      <form class="flex flex-col">
        <!-- name row -->
        <div class="flex gap-3">
          <!-- first name -->
          <div class="flex flex-col gap-y-1 min-h-[93.6px] w-1/2">
            <label for="first-name" class="font-semibold">First Name</label>
            <input
              type="text"
              id="first-name"
              class="border rounded-sm p-2"
              name="first-name"
            />
            <p class="text-red-500 text-[13.5px] hidden" id="fname-msg"></p>
          </div>

          <!-- last name -->
          <div class="flex flex-col gap-y-1 min-h-[93.6px] w-1/2">
            <label for="last-name" class="font-semibold">Last Name</label>
            <input
              type="text"
              id="last-name"
              class="border rounded-sm p-2"
              name="last-name"
            />
            <p class="text-red-500 text-[13.5px] hidden" id="lname-msg">
              Last name is not valid.
            </p>
          </div>
        </div>

        <!-- email -->
        <div class="flex flex-col gap-y-1 min-h-[93.6px]">
          <label for="email" class="font-semibold">Email</label>
          <input type="text" id="email" class="border rounded-sm p-2" />
          <p class="text-red-500 text-[13.5px] hidden" id="email-msg"></p>
        </div>

        <!-- password -->
        <div class="flex flex-col relative min-h-[93.850px]">
          <label for="password" class="font-semibold">Password</label>
          <input
            type="password"
            id="password"
            class="border rounded-sm p-2 mt-1"
          />
          <!-- show password icon -->
          <span id="toggle-password" class="mt-1">
            <i
              data-lucide="eye"
              class="text-(--text) absolute right-4 top-9.25 w-5 lg:w-5.5 cursor-pointer hover:text-(--primary) transition duration-300"
              id="icon-eye"
            ></i>
          </span>
          <p class="text-red-500 text-[13.5px] hidden" id="password-msg"></p>
        </div>

        <!-- confirm password -->
        <div class="flex flex-col min-h-[93.850px] relative">
          <label for="confirm-password" class="font-semibold"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirm-password"
            class="border rounded-sm p-2 mt-1"
          />
          <!-- show password icon -->
          <span id="toggle-confirm-password" class="mt-1">
            <i
              data-lucide="eye"
              class="text-(--text) absolute right-4 top-9.25 w-5 lg:w-5.5 cursor-pointer hover:text-(--primary) transition duration-300"
              id="icon-eye-confirm"
            ></i>
          </span>
          <p
            class="text-red-500 text-[13.5px] hidden"
            id="confirm-password-msg"
          ></p>
        </div>

        <!-- submit -->
        <button
          type="submit"
          class="bg-(--primaryHover) py-2 rounded-sm font-semibold cursor-pointer hover:bg-(--primary) transition duration-300 mt-2"
        >
          Sign up
        </button>
        <p class="mt-3 text-center text-sm">
          Already have an account?
          <a
            href="http://127.0.0.1:5000/signin"
            class="text-(--primaryHover) hover:text(--primary) transition duration-300"
            >Sign in</a
          >
        </p>
      </form>
      <!-- or splitter -->
      <div class="flex items-center">
        <span class="flex-1 bg-(--muted) h-px mt-1"></span>
        <span class="text-(--muted) font-semibold px-2">or</span>
        <span class="flex-1 bg-(--muted) h-px mt-1"></span>
      </div>
      <!-- sing in with google -->
      <div
        class="border flex items-center justify-center gap-3 border-gray-300 rounded-sm p-2 cursor-pointer hover:shadow transition duration-300"
      >
        <img
          src="https://cdn.shipstation.com/auth0/shipstation/public/images/google.svg"
          alt="google logo"
          class="h-5"
        />
        <span class="font-semibold text-[15px] lg:text-[16px]"
          >Sign in with Google</span
        >
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{{ url_for('static', filename='js/validator.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
  </body>
</html>
